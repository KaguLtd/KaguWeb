version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kagu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kagu?schema=public
      JWT_SECRET: super-secret
      PORT: 4000
      STORAGE_ROOT: /app/storage
      WEB_ORIGIN: http://localhost:3000
    volumes:
      - ./storage:/app/storage
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:

